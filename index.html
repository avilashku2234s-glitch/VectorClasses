<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vector classes | login page</title>
    <style>
        .card { 
      background: rgba(51, 236, 14, 0.05); 
      backdrop-filter: blur(100px); 
      -webkit-backdrop-filter: blur(25px);
      padding: 40px 30px; border-radius: 24px; 
      width: 100%; 
      max-width: 250px; /* डेस्कटॉप पर चौड़ाई */
      box-shadow: 0 25px 50px rgba(84, 37, 211, 0.3); 
      border: 1px solid rgba(46, 48, 194, 0.1);
      color: white; text-align: center;}
      body{
        margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),url(vector_classes_logo.jpg); background-size: 200px; background-position: center ; background-attachment: fixed; padding:0 ;
      }
      h1{color:#38bdf8;}
      p{color: rgba(255,255,255,0.6);}
      .google-login{
        display: flex; align-items: center;
        justify-content: center; gap: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 15px; color: white; font-family: Arial,sans-serif;

      }
      .google-login:hover {
        background: rgba(255,255,255,0.2);

      }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <a href="home.html" target="_blank"></a>
    <div class="card">
        <h1>vector classes</h1>
        <h5>Aim Higher, Learn Smarter, Scuceed Faster</h5>

        </div> -->
        <div id="g_id_onload"
        data-client_id="975898657895-jrqnohk160d2vngajh36hg6ku8g8th9v.apps.googleusercontent.com"

        data-auth_prompt="false"></div>
        <div class="g_id_signin"
        data-type="standard"
