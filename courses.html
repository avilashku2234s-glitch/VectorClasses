        const db = firebase.firestore();

        // Data Load Function
        db.collection("videos").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const mathGrid = document.getElementById('math-grid');
            const scienceGrid = document.getElementById('science-grid');
            
            mathGrid.innerHTML = '';
            scienceGrid.innerHTML = '';

            snapshot.forEach(doc => {
                const video = doc.data();
                const cardHTML = `
                    <div class="video-card">
                        <iframe src="${video.url}" title="YouTube video"></iframe>
                        <div class="video-info">
                            <h3>${video.title}</h3>
                            <span>${video.class}</span>
                        </div>
                    </div>
                `;

                if(video.class === "Class 7 Maths") {
                    mathGrid.innerHTML += cardHTML;
                } else if(video.class === "Class 8 Science") {
                    scienceGrid.innerHTML += cardHTML;
                }
            });
        });

        function filterVideos() {
            let input = document.querySelector('.search-bar').value.toLowerCase();
            let cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                let title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "block" : "none";
            });
        }

        function updateSubjects() {
            const classVal = document.getElementById("classSelect").value;
            const subjectSelect = document.getElementById("subjectSelect");
            subjectSelect.innerHTML = '<option value="">-- Select Subject --</option>';
            
            if(classVal && data[classVal]) {
                for(let subject in data[classVal]) {
                    subjectSelect.innerHTML += `<option value="${subject}">${subject}</option>`;
                }
            }
            updateChapters(); // Reset chapters
        }

        function updateChapters() {
            const classVal = document.getElementById("classSelect").value;
            const subjectVal = document.getElementById("subjectSelect").value;
            const chapterSelect = document.getElementById("chapterSelect");
            chapterSelect.innerHTML = '<option value="">-- Select Chapter --</option>';

            if(classVal && subjectVal && data[classVal][subjectVal]) {
                data[classVal][subjectVal].forEach(chap => {
                    chapterSelect.innerHTML += `<option value="${chap.url}">${chap.name}</option>`;
                });
            }
        }

        function openPDF() {
            const url = document.getElementById("chapterSelect").value;
            if(url) {
                window.open(url, "_blank");
            } else {
                alert("कृपया सभी विकल्प चुनें!");
            }   
         }
         function logout() {
            auth.signOut().then(() => { window.location.href="login.html" });
